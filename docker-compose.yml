#version: '3.9'

services:

  # ─── Base de datos PostgreSQL ───────────────────────────
  db:
    image: postgres:16-alpine
    container_name: levelproaudio_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  # ─── Backend Django ─────────────────────────────────────
  backend:
    working_dir: /app
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: levelproaudio_backend
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  # ─── Frontend React ──────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: levelproaudio_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    env_file:
      - .env
    depends_on:
      - backend

volumes:
  postgres_data:
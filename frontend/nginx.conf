# frontend/nginx.conf
# Nginx sirve el build de React y proxea /api y /media al backend de Cloud Run

server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip para performance
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;
    gzip_min_length 256;

    # Cache de assets estáticos (JS/CSS hasheados por Vite)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # API → Backend Cloud Run
    location /api/ {
        proxy_pass        ${BACKEND_URL};
        proxy_set_header  Host              $host;
        proxy_set_header  X-Real-IP         $remote_addr;
        proxy_set_header  X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header  X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Media → Cloud Storage (las imágenes se sirven directo desde GCS)
    # No necesitamos proxy aquí porque la URL ya es pública de GCS

    # SPA fallback — todas las rutas van al index.html de React
    location / {
        try_files $uri $uri/ /index.html;
    }
}

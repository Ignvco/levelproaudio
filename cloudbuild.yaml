# cloudbuild.yaml — raíz del repo
# Usa Artifact Registry (us-central1-docker.pkg.dev) en vez de gcr.io

substitutions:
  _REGION:           "us-central1"
  _BACKEND_SERVICE:  "levelproaudio-backend"
  _FRONTEND_SERVICE: "levelproaudio-frontend"
  _SQL_INSTANCE:     "levelproaudio:us-central1:levelproaudio-db"
  _SA_EMAIL:         "levelproaudio-run@levelproaudio.iam.gserviceaccount.com"
  _TAG:              "latest"
  _REPO:             "us-central1-docker.pkg.dev/$PROJECT_ID/levelproaudio-docker"

steps:

  # ── 1. Build Backend ─────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-backend"
    args:
      - build
      - -t
      - "${_REPO}/backend:${_TAG}"
      - -f
      - backend/Dockerfile.prod
      - ./backend

  # ── 2. Build Frontend ────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-frontend"
    args:
      - build
      - -t
      - "${_REPO}/frontend:${_TAG}"
      - -f
      - frontend/Dockerfile.prod
      - ./frontend

  # ── 3. Push Backend ──────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-backend"
    waitFor: ["build-backend"]
    args: ["push", "${_REPO}/backend:${_TAG}"]

  # ── 4. Push Frontend ─────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-frontend"
    waitFor: ["build-frontend"]
    args: ["push", "${_REPO}/frontend:${_TAG}"]

  # ── 5. Deploy Backend ────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-backend"
    waitFor: ["push-backend"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_BACKEND_SERVICE}"
      - --image=${_REPO}/backend:${_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --service-account=${_SA_EMAIL}
      - --add-cloudsql-instances=${_SQL_INSTANCE}
      - --set-env-vars=DJANGO_SETTINGS_MODULE=config.settings.production
      - --set-env-vars=CLOUD_SQL_CONNECTION_NAME=${_SQL_INSTANCE}
      - --update-secrets=SECRET_KEY=DJANGO_SECRET_KEY:latest
      - --update-secrets=DB_NAME=DB_NAME:latest
      - --update-secrets=DB_USER=DB_USER:latest
      - --update-secrets=DB_PASSWORD=DB_PASSWORD:latest
      - --update-secrets=GCS_BUCKET_NAME=levelproaudio-gcs-bucket:latest
      - --update-secrets=GCS_PROJECT_ID=levelproaudio-gcs-project:latest
      - --update-secrets=DJANGO_ALLOWED_HOSTS=DJANGO_ALLOWED_HOSTS:latest

  # ── 6. Obtener URL del backend ────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "get-backend-url"
    waitFor: ["deploy-backend"]
    entrypoint: bash
    args:
      - -c
      - |
        BACKEND_URL=$(gcloud run services describe ${_BACKEND_SERVICE} \
          --region=${_REGION} --format="value(status.url)")
        echo "$$BACKEND_URL" > /workspace/backend_url.txt
        echo "Backend URL: $$BACKEND_URL"

  # ── 7. Deploy Frontend con URL del backend ───────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-frontend"
    waitFor: ["push-frontend", "get-backend-url"]
    entrypoint: bash
    args:
      - -c
      - |
        BACKEND_URL=$(cat /workspace/backend_url.txt)
        gcloud run deploy ${_FRONTEND_SERVICE} \
          --image=${_REPO}/frontend:${_TAG} \
          --region=${_REGION} \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --memory=256Mi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=3 \
          --service-account=${_SA_EMAIL} \
          --set-env-vars="BACKEND_URL=$$BACKEND_URL"

images:
  - "${_REPO}/backend:${_TAG}"
  - "${_REPO}/frontend:${_TAG}"

options:
  logging: CLOUD_LOGGING_ONLY

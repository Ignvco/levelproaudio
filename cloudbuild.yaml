# cloudbuild.yaml — raíz del repo
# Adaptado a los secrets reales del proyecto levelproaudio

substitutions:
  _REGION:           "us-central1"
  _BACKEND_SERVICE:  "levelproaudio-backend"
  _FRONTEND_SERVICE: "levelproaudio-frontend"
  _SQL_INSTANCE:     "levelproaudio:us-central1:levelproaudio-db"
  _SA_EMAIL:         "levelproaudio-run@levelproaudio.iam.gserviceaccount.com"

steps:

  # ── 1. Build Backend ─────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-backend"
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/levelproaudio-backend:$SHORT_SHA"
      - -t
      - "gcr.io/$PROJECT_ID/levelproaudio-backend:latest"
      - -f
      - backend/Dockerfile.prod
      - ./backend

  # ── 2. Build Frontend ────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-frontend"
    args:
      - build
      - -t
      - "gcr.io/$PROJECT_ID/levelproaudio-frontend:$SHORT_SHA"
      - -t
      - "gcr.io/$PROJECT_ID/levelproaudio-frontend:latest"
      - -f
      - frontend/Dockerfile.prod
      - ./frontend

  # ── 3. Push imágenes ─────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-backend"
    waitFor: ["build-backend"]
    args: ["push", "gcr.io/$PROJECT_ID/levelproaudio-backend:$SHORT_SHA"]

  - name: "gcr.io/cloud-builders/docker"
    id: "push-frontend"
    waitFor: ["build-frontend"]
    args: ["push", "gcr.io/$PROJECT_ID/levelproaudio-frontend:$SHORT_SHA"]

  # ── 4. Deploy Backend ────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-backend"
    waitFor: ["push-backend"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_BACKEND_SERVICE}"
      - --image=gcr.io/$PROJECT_ID/levelproaudio-backend:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --service-account=${_SA_EMAIL}
      - --add-cloudsql-instances=${_SQL_INSTANCE}
      - --set-env-vars=DJANGO_SETTINGS_MODULE=config.settings.production
      - --set-env-vars=CLOUD_SQL_CONNECTION_NAME=${_SQL_INSTANCE}
      - --update-secrets=SECRET_KEY=DJANGO_SECRET_KEY:latest
      - --update-secrets=DB_NAME=DB_NAME:latest
      - --update-secrets=DB_USER=DB_USER:latest
      - --update-secrets=DB_PASSWORD=DB_PASSWORD:latest
      - --update-secrets=GCS_BUCKET_NAME=levelproaudio-gcs-bucket:latest
      - --update-secrets=GCS_PROJECT_ID=levelproaudio-gcs-project:latest
      - --update-secrets=DJANGO_ALLOWED_HOSTS=DJANGO_ALLOWED_HOSTS:latest

  # ── 5. Deploy Frontend ───────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-frontend"
    waitFor: ["push-frontend", "deploy-backend"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - "${_FRONTEND_SERVICE}"
      - --image=gcr.io/$PROJECT_ID/levelproaudio-frontend:$SHORT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=3
      - --service-account=${_SA_EMAIL}

images:
  - "gcr.io/$PROJECT_ID/levelproaudio-backend:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/levelproaudio-backend:latest"
  - "gcr.io/$PROJECT_ID/levelproaudio-frontend:$SHORT_SHA"
  - "gcr.io/$PROJECT_ID/levelproaudio-frontend:latest"

options:
  logging: CLOUD_LOGGING_ONLY
